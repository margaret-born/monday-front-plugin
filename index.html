<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Work</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px; background: #f6f7fb; color: #323338;
    height: 100vh; display: flex; flex-direction: column;
  }

  #setup {
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    flex: 1; padding: 24px; gap: 12px;
  }
  #setup h2 { font-size: 15px; font-weight: 600; }
  #setup p  { font-size: 12px; color: #676879; text-align: center; line-height: 1.5; }
  #setup input {
    width: 100%; padding: 8px 10px;
    border: 1px solid #c3c6d4; border-radius: 6px; font-size: 13px; outline: none;
  }
  #setup input:focus { border-color: #0073ea; }
  #setup button {
    width: 100%; padding: 9px; background: #0073ea; color: #fff;
    border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  #setup button:hover { background: #0060c0; }
  #setup .err { color: #d83a52; font-size: 12px; }

  #main { display: none; flex-direction: column; flex: 1; overflow: hidden; }

  .topbar {
    padding: 10px 12px 8px;
    border-bottom: 1px solid #e6e9ef; background: #fff; flex-shrink: 0;
  }
  .topbar-row1 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .topbar h1 { font-size: 14px; font-weight: 700; }
  .topbar-actions { display: flex; gap: 6px; align-items: center; }
  .icon-btn {
    background: none; border: none; cursor: pointer; color: #676879;
    padding: 4px; border-radius: 4px; display: flex; align-items: center;
  }
  .icon-btn:hover { background: #f0f2f8; color: #0073ea; }
  .icon-btn.spinning svg { animation: spin .7s linear infinite; }
  .topbar-row2 { display: flex; align-items: center; justify-content: space-between; }
  .topbar-summary { font-size: 11px; color: #676879; }

  /* Stale indicator */
  .stale-badge {
    font-size: 10px; color: #fff; background: #fdab3d;
    border-radius: 10px; padding: 1px 6px; display: none;
  }
  .stale-badge.visible { display: inline-block; }

  .group-toggle {
    display: flex; background: #f0f2f8; border-radius: 6px; padding: 2px; gap: 2px;
  }
  .toggle-btn {
    font-size: 11px; font-weight: 500; color: #676879;
    border: none; background: none; border-radius: 4px;
    padding: 3px 9px; cursor: pointer; transition: background .12s, color .12s; white-space: nowrap;
  }
  .toggle-btn.active { background: #fff; color: #0073ea; box-shadow: 0 1px 3px rgba(0,0,0,.1); }

  /* Progress bar */
  .progress-bar-wrap {
    height: 2px; background: #e6e9ef; flex-shrink: 0; display: none;
  }
  .progress-bar-wrap.visible { display: block; }
  .progress-bar {
    height: 100%; background: #0073ea;
    transition: width .3s ease; width: 0%;
  }

  #scroll { overflow-y: auto; flex: 1; padding: 10px 10px 20px; }

  .group { margin-bottom: 14px; }
  .group-header {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 6px; border-radius: 5px; margin-bottom: 6px;
    cursor: pointer; user-select: none;
  }
  .group-header:hover { background: rgba(0,0,0,.04); }
  .group-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .group-label { font-weight: 600; font-size: 12px; flex: 1; }
  .group-count {
    font-size: 11px; color: #676879;
    background: #e6e9ef; border-radius: 10px; padding: 1px 6px;
  }
  .chevron { font-size: 10px; color: #676879; transition: transform .15s; }
  .chevron.open { transform: rotate(90deg); }

  .cards { display: flex; flex-direction: column; gap: 6px; }
  .card {
    background: #fff; border: 1px solid #e6e9ef;
    border-radius: 8px; padding: 9px 11px;
    transition: box-shadow .12s, border-color .12s;
  }
  .card:hover { border-color: #c3c6d4; box-shadow: 0 1px 6px rgba(0,0,0,.07); }
  .card-top {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 6px; margin-bottom: 6px;
  }
  .card-name {
    font-weight: 500; font-size: 13px; line-height: 1.4;
    word-break: break-word; flex: 1; cursor: pointer;
  }
  .card-name:hover { color: #0073ea; text-decoration: underline; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .meta-tag {
    font-size: 11px; background: #f0f2f8; color: #676879;
    border-radius: 4px; padding: 2px 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px;
  }
  .meta-tag.board   { color: #0073ea; background: #e8f3fe; }
  .meta-tag.due     { color: #c97d00; background: #fff3d6; }
  .meta-tag.overdue { color: #d83a52; background: #fde8ec; }
  .meta-tag.nodue   { color: #c3c6d4; background: #f6f7fb; font-style: italic; }

  .status-wrap { position: relative; flex-shrink: 0; }
  .status-pill {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px;
    cursor: pointer; border: none; outline: none; white-space: nowrap;
    transition: filter .1s; color: #fff;
  }
  .status-pill:hover { filter: brightness(.9); }
  .status-pill .pill-caret { font-size: 8px; opacity: .8; }
  .status-pill.saving { opacity: .6; pointer-events: none; }

  .status-menu {
    display: none; flex-direction: column;
    position: fixed; z-index: 9999;
    border: 1px solid #e6e9ef; border-radius: 8px;
    overflow-y: auto; background: #fff;
    box-shadow: 0 4px 16px rgba(0,0,0,.15);
    min-width: 160px; max-height: 220px;
  }
  .status-menu.open { display: flex; flex-direction: column; }
  .status-option {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; cursor: pointer; font-size: 12px;
    border-bottom: 1px solid #f0f2f8;
  }
  .status-option:last-child { border-bottom: none; }
  .status-option:hover { background: #f6f7fb; }
  .status-option.current { font-weight: 600; background: #f0f2f8; }
  .opt-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; padding: 40px 20px;
    color: #676879; font-size: 12px; text-align: center;
  }
  .initial-loading {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; padding: 40px 20px;
    color: #676879; font-size: 12px; text-align: center;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid #e6e9ef; border-top-color: #0073ea;
    border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer {
    padding: 6px 12px; font-size: 11px; color: #c3c6d4;
    text-align: right; flex-shrink: 0;
    border-top: 1px solid #e6e9ef; background: #fff;
  }
  .footer a { color: #c3c6d4; text-decoration: none; cursor: pointer; font-size: 10px; }
  .footer a:hover { color: #d83a52; }

  .toast {
    position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
    background: #323338; color: #fff; font-size: 12px;
    padding: 7px 14px; border-radius: 20px;
    opacity: 0; transition: opacity .2s; pointer-events: none; white-space: nowrap; z-index: 9999;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="setup">
  <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
    <rect width="36" height="36" rx="8" fill="#0073EA"/>
    <path d="M9 18l6 6 12-12" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <h2>Connect Monday.com</h2>
  <p>Enter your Monday API token to view and update your assigned tasks directly from Front.</p>
  <input id="token-input" type="password" placeholder="API token (starts with eyJ…)" autocomplete="off"/>
  <button id="connect-btn">Connect</button>
  <span id="setup-err" class="err"></span>
  <p style="font-size:11px;color:#c3c6d4">Get your token: Monday → Profile photo → Admin → API</p>
</div>

<div id="main">
  <div class="topbar">
    <div class="topbar-row1">
      <h1>My Work</h1>
      <div class="topbar-actions">
        <span class="stale-badge" id="stale-badge">Updating…</span>
        <button class="icon-btn" id="refresh-btn" title="Refresh">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
        <button class="icon-btn" id="logout-btn" title="Disconnect">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="topbar-row2">
      <span class="topbar-summary" id="summary"></span>
      <div class="group-toggle">
        <button class="toggle-btn active" id="btn-status" data-group="status">By Status</button>
        <button class="toggle-btn" id="btn-board" data-group="board">By Board</button>
      </div>
    </div>
  </div>
  <div class="progress-bar-wrap" id="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  <div id="scroll">
    <div class="initial-loading" id="initial-loading"><div class="spinner"></div><span>Loading your tasks…</span></div>
    <div id="board"></div>
  </div>
  <div class="footer">
    <span id="last-updated"></span> &nbsp;·&nbsp; <a id="logout-link">Disconnect</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API         = 'https://api.monday.com/v2';
const STORAGE_KEY = 'monday_api_token';
const GROUP_KEY   = 'monday_group_by';
const CACHE_KEY   = 'monday_items_cache';
const BATCH_SIZE  = 10;
const MAX_BOARDS  = 100;

let currentItems = [];
let groupBy = localStorage.getItem(GROUP_KEY) || 'status';
let isRefreshing = false;

// ── Toggle ──
document.querySelectorAll('.toggle-btn').forEach(b => {
  b.classList.toggle('active', b.dataset.group === groupBy);
  b.addEventListener('click', () => {
    groupBy = b.dataset.group;
    localStorage.setItem(GROUP_KEY, groupBy);
    document.querySelectorAll('.toggle-btn').forEach(x =>
      x.classList.toggle('active', x.dataset.group === groupBy));
    renderBoard(currentItems, getToken());
  });
});

document.addEventListener('click', e => {
  if (!e.target.closest('.status-wrap')) closeAllMenus();
});
function closeAllMenus() {
  document.querySelectorAll('.status-menu.open').forEach(m => m.classList.remove('open'));
}

// ── Colours ──
const STATUS_COLORS = {
  'done':'#00c875','completed':'#00c875',
  'working on it':'#fdab3d','in progress':'#fdab3d',
  'stuck':'#e2445c','blocked':'#e2445c',
  'waiting for review':'#a25ddc','pending review':'#a25ddc',
  'not started':'#c4c4c4','':'#c4c4c4','default':'#0073ea'
};
function statusColor(l) { return STATUS_COLORS[(l||'').toLowerCase()] || STATUS_COLORS.default; }

// ── Storage ──
function getToken() { return localStorage.getItem(STORAGE_KEY); }
function saveToken(t) { localStorage.setItem(STORAGE_KEY, t); }
function clearToken() { localStorage.removeItem(STORAGE_KEY); }

function saveCache(items) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), items })); } catch {}
}
function loadCache() {
  try {
    const c = JSON.parse(localStorage.getItem(CACHE_KEY));
    return c?.items || null;
  } catch { return null; }
}
function clearCache() { localStorage.removeItem(CACHE_KEY); }

// ── UI helpers ──
function showSetup(err) {
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('main').style.display = 'none';
  if (err) document.getElementById('setup-err').textContent = err;
}
function showMain() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('main').style.display = 'flex';
}
function showToast(msg, dur=2000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}
function setProgress(pct) {
  const wrap = document.getElementById('progress-wrap');
  const bar  = document.getElementById('progress-bar');
  if (pct <= 0) { wrap.classList.remove('visible'); bar.style.width = '0%'; return; }
  wrap.classList.add('visible');
  bar.style.width = `${Math.min(pct, 100)}%`;
  if (pct >= 100) setTimeout(() => wrap.classList.remove('visible'), 400);
}
function setStaleBadge(visible) {
  document.getElementById('stale-badge').classList.toggle('visible', visible);
  document.getElementById('refresh-btn').classList.toggle('spinning', visible);
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── API ──
async function gql(query, variables, token) {
  const r = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization':token, 'API-Version':'2024-01' },
    body: JSON.stringify({ query, variables })
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const j = await r.json();
  if (j.errors) throw new Error(j.errors[0].message);
  return j.data;
}

async function fetchMe(token) {
  const d = await gql(`{ me { id name } }`, {}, token);
  return d.me;
}

function chunk(arr, n) {
  const out = [];
  for (let i = 0; i < arr.length; i += n) out.push(arr.slice(i, i+n));
  return out;
}

function parseBoardItems(boardMeta, boardResult, userId) {
  if (!boardResult) return [];
  const statusCol  = (boardMeta.columns||[]).find(c => c.type==='color' || c.type==='status');
  const dateColDef = (boardMeta.columns||[]).find(c => c.type==='date'  || c.type==='timeline');

  let statusOptions = [];
  if (statusCol?.settings_str) {
    try {
      const s = JSON.parse(statusCol.settings_str);
      statusOptions = Object.entries(s.labels||{}).map(([idx, label]) => ({
        index: parseInt(idx), label,
        color: s.labels_colors?.[idx]?.color || statusColor(label)
      }));
    } catch {}
  }

  const found = [];
  for (const item of (boardResult.items_page?.items || [])) {
    const personCv = item.column_values.find(c => c.type === 'people');
    if (!personCv?.value) continue;
    let assigned = false;
    try {
      const v = JSON.parse(personCv.value);
      assigned = (v.personsAndTeams||[]).some(p => String(p.id) === String(userId));
    } catch { continue; }
    if (!assigned) continue;

    const sCv    = item.column_values.find(c => c.type==='color' || c.type==='status');
    const status = sCv?.text || 'No Status';
    const currentOpt = statusOptions.find(o => o.label === status);

    const dateCv = dateColDef
      ? item.column_values.find(c => c.id === dateColDef.id && c.text)
      : item.column_values.find(c => (c.type==='date'||c.type==='timeline') && c.text);
    let due = null;
    if (dateCv?.text) {
      const parts = dateCv.text.split(' - ');
      due = parts[parts.length-1].trim();
    }

    found.push({
      id: item.id, name: item.name,
      board: boardMeta.name, boardId: boardMeta.id,
      status, statusIndex: currentOpt?.index ?? null,
      statusColId: statusCol?.id || 'status',
      statusOptions, due
    });
  }
  return found;
}

async function fetchMyItems(token, userId, onBatchDone) {
  // Step 1: board list + column metadata (single fast request)
  const boardList = await gql(`{
    boards(limit:${MAX_BOARDS}, state:active, board_kind:all) { id name columns { id type settings_str } }
  }`, {}, token);

  const boards  = boardList.boards || [];
  const batches = chunk(boards, BATCH_SIZE);
  const allItems = [];
  let completed = 0;

  // Step 2: fire ALL batches in parallel
  const batchPromises = batches.map(async (batch, bi) => {
    const aliasQ = batch.map((b, i) =>
      `b${i}: boards(ids:[${b.id}]) {
        id items_page(limit:100) {
          items { id name column_values { id type text value } }
        }
      }`
    ).join('\n');

    let batchData;
    try { batchData = await gql(`{ ${aliasQ} }`, {}, token); }
    catch { completed++; onBatchDone(Math.round((completed/batches.length)*100)); return; }

    const batchItems = [];
    for (let i = 0; i < batch.length; i++) {
      const parsed = parseBoardItems(batch[i], batchData[`b${i}`]?.[0], userId);
      batchItems.push(...parsed);
    }

    completed++;
    allItems.push(...batchItems);
    // Render incrementally as each batch finishes
    onBatchDone(Math.round((completed/batches.length)*100), batchItems);
  });

  await Promise.all(batchPromises);
  return allItems;
}

async function updateStatus(token, itemId, boardId, colId, statusIndex) {
  await gql(
    `mutation($boardId:ID!,$itemId:ID!,$colId:String!,$val:JSON!){
       change_column_value(board_id:$boardId,item_id:$itemId,column_id:$colId,value:$val,create_labels_if_missing:false){id}
     }`,
    { boardId:String(boardId), itemId:String(itemId), colId, val:JSON.stringify({index:statusIndex}) },
    token
  );
}

// ── Rendering ──
function formatDue(dateStr) {
  if (!dateStr) return null;
  try {
    const d = new Date(dateStr+'T00:00:00');
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.round((d-today)/86400000);
    if (diff < 0)   return { label:`Overdue · ${dateStr}`, cls:'overdue' };
    if (diff === 0) return { label:'Due today', cls:'due' };
    if (diff === 1) return { label:'Due tomorrow', cls:'due' };
    return { label:`Due ${dateStr}`, cls:'due' };
  } catch { return null; }
}

function buildStatusPill(item, token) {
  const wrap = document.createElement('div');
  wrap.className = 'status-wrap';

  const pill = document.createElement('button');
  pill.className = 'status-pill';
  pill.style.background = statusColor(item.status);
  pill.innerHTML = `${escHtml(item.status)} <span class="pill-caret">▾</span>`;

  const menu = document.createElement('div');
  menu.className = 'status-menu';
  document.body.appendChild(menu); // attach to body so fixed pos works in Electron

  for (const opt of item.statusOptions) {
    const row = document.createElement('div');
    row.className = 'status-option' + (opt.label === item.status ? ' current' : '');
    row.innerHTML = `<span class="opt-dot" style="background:${opt.color}"></span>${escHtml(opt.label)}`;
    row.addEventListener('click', async e => {
      e.stopPropagation();
      if (opt.label === item.status) { menu.classList.remove('open'); return; }
      menu.classList.remove('open');
      pill.classList.add('saving');
      pill.innerHTML = `Saving… <span class="pill-caret">▾</span>`;
      try {
        await updateStatus(token, item.id, item.boardId, item.statusColId, opt.index);
        item.status = opt.label;
        item.statusIndex = opt.index;
        pill.style.background = opt.color;
        pill.innerHTML = `${escHtml(opt.label)} <span class="pill-caret">▾</span>`;
        menu.querySelectorAll('.status-option').forEach(r => r.classList.remove('current'));
        row.classList.add('current');
        saveCache(currentItems);
        showToast('✓ Status updated');
        renderBoard(currentItems, token);
      } catch {
        pill.innerHTML = `${escHtml(item.status)} <span class="pill-caret">▾</span>`;
        showToast('⚠ Could not update status', 3000);
      } finally { pill.classList.remove('saving'); }
    });
    menu.appendChild(row);
  }

  pill.addEventListener('click', e => {
    e.stopPropagation();
    const wasOpen = menu.classList.contains('open');
    closeAllMenus();
    if (!wasOpen && item.statusOptions.length > 0) {
      const rect = pill.getBoundingClientRect();
      const mw = 180;
      let left = rect.right - mw;
      if (left < 8) left = 8;
      let top = rect.bottom + 4;
      const estH = Math.min(item.statusOptions.length * 36, 220);
      if (top + estH > window.innerHeight - 8) top = rect.top - estH - 4;
      menu.style.left = `${left}px`;
      menu.style.top  = `${top}px`;
      menu.style.width = `${mw}px`;
      menu.classList.add('open');
    }
  });

  // Clean up menu from body when card is removed
  wrap._menu = menu;
  wrap.appendChild(pill);
  return wrap;
}

function buildCard(item, token) {
  const due  = formatDue(item.due);
  const card = document.createElement('div');
  card.className = 'card';

  const top = document.createElement('div');
  top.className = 'card-top';

  const name = document.createElement('div');
  name.className = 'card-name';
  name.textContent = item.name;
  name.title = 'Open in Monday';
  name.addEventListener('click', () =>
    window.open(`https://monday.com/boards/${item.boardId}/pulses/${item.id}`, '_blank')
  );
  top.appendChild(name);
  top.appendChild(buildStatusPill(item, token));

  const meta = document.createElement('div');
  meta.className = 'card-meta';
  if (groupBy === 'status')
    meta.innerHTML += `<span class="meta-tag board" title="${escHtml(item.board)}">${escHtml(item.board)}</span>`;
  meta.innerHTML += due
    ? `<span class="meta-tag ${due.cls}">${due.label}</span>`
    : `<span class="meta-tag nodue">No due date</span>`;

  card.appendChild(top);
  card.appendChild(meta);
  return card;
}

function renderBoard(items, token) {
  // Clean up any body-attached menus from prior render
  document.querySelectorAll('.status-menu').forEach(m => m.remove());

  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';

  const boards = new Set(items.map(i => i.board));
  document.getElementById('summary').textContent = items.length
    ? `${items.length} task${items.length!==1?'s':''} across ${boards.size} board${boards.size!==1?'s':''}`
    : '';

  if (!items.length) {
    boardEl.innerHTML = `<div class="empty-state">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
      <span>No tasks assigned to you.</span></div>`;
    return;
  }

  const groups = {};
  for (const item of items) {
    const key = groupBy === 'board' ? item.board : item.status;
    if (!groups[key]) groups[key] = [];
    groups[key].push(item);
  }

  const sortedKeys = Object.keys(groups).sort((a, b) => {
    if (groupBy === 'status') {
      const aD = /done|complet/i.test(a) ? 1 : 0;
      const bD = /done|complet/i.test(b) ? 1 : 0;
      return aD - bD || a.localeCompare(b);
    }
    return a.localeCompare(b);
  });

  for (const key of sortedKeys) {
    const grpItems = groups[key];
    const grp = document.createElement('div');
    grp.className = 'group';

    const dotColor = groupBy === 'status' ? statusColor(key) : '#0073ea';
    const hdr = document.createElement('div');
    hdr.className = 'group-header';
    hdr.innerHTML = `
      <span class="group-dot" style="background:${dotColor}"></span>
      <span class="group-label">${escHtml(key)}</span>
      <span class="group-count">${grpItems.length}</span>
      <span class="chevron open">▶</span>`;

    const cards = document.createElement('div');
    cards.className = 'cards';
    for (const item of grpItems) cards.appendChild(buildCard(item, token));

    hdr.addEventListener('click', () => {
      const open = cards.style.display !== 'none';
      cards.style.display = open ? 'none' : 'flex';
      hdr.querySelector('.chevron').classList.toggle('open', !open);
    });

    grp.appendChild(hdr);
    grp.appendChild(cards);
    boardEl.appendChild(grp);
  }
}

// ── Load ──
async function load(token, background = false) {
  if (isRefreshing) return;
  isRefreshing = true;

  const cached = loadCache();

  if (cached && cached.length > 0) {
    // Show cached data immediately
    currentItems = cached;
    document.getElementById('initial-loading').style.display = 'none';
    renderBoard(currentItems, token);
    // Show stale indicator while refreshing in background
    setStaleBadge(true);
    setProgress(2); // nudge bar to show activity
  } else {
    document.getElementById('initial-loading').style.display = 'flex';
    document.getElementById('board').innerHTML = '';
    document.getElementById('summary').textContent = '';
    setProgress(2);
  }

  try {
    const me = await fetchMe(token);
    const freshItems = [];

    await fetchMyItems(token, me.id, (pct, batchItems) => {
      setProgress(pct);
      if (batchItems && batchItems.length > 0) {
        freshItems.push(...batchItems);
        // Hide initial spinner once first tasks arrive
        document.getElementById('initial-loading').style.display = 'none';
        currentItems = [...freshItems];
        renderBoard(currentItems, token);
      }
    });

    // Final render with all items
    currentItems = freshItems;
    saveCache(currentItems);
    renderBoard(currentItems, token);
    setProgress(100);

    const now = new Date();
    document.getElementById('last-updated').textContent =
      `Updated ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  } catch(e) {
    if (!currentItems.length) {
      document.getElementById('initial-loading').style.display = 'none';
      document.getElementById('board').innerHTML = `<div class="empty-state" style="color:#d83a52">
        <span>⚠ ${escHtml(e.message)}</span>
        <span style="font-size:11px;color:#999">Check your token or network.</span></div>`;
    } else {
      showToast('⚠ Refresh failed — showing cached tasks', 3000);
    }
  } finally {
    setStaleBadge(false);
    isRefreshing = false;
  }
}

// ── Wiring ──
document.getElementById('connect-btn').addEventListener('click', async () => {
  const t = document.getElementById('token-input').value.trim();
  if (!t) return;
  document.getElementById('setup-err').textContent = 'Verifying…';
  try {
    await fetchMe(t);
    saveToken(t); showMain(); load(t);
  } catch {
    document.getElementById('setup-err').textContent = 'Could not connect. Double-check your token.';
  }
});
document.getElementById('token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('connect-btn').click();
});
document.getElementById('refresh-btn').addEventListener('click', () => {
  if (!isRefreshing) load(getToken());
});

function logout() {
  clearToken(); clearCache();
  document.getElementById('token-input').value = '';
  document.getElementById('setup-err').textContent = '';
  showSetup();
}
document.getElementById('logout-btn').addEventListener('click', logout);
document.getElementById('logout-link').addEventListener('click', logout);

// ── Init ──
const saved = getToken();
if (saved) { showMain(); load(saved); } else showSetup();
</script>
